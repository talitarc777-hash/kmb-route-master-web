name: Deploy static content to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    
    # This tells GitHub to look inside your subfolder for ALL steps
    defaults:
      run:
        working-directory: kmb-route-master-web

    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
- name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          # We removed the cache lines to prevent the "paths not resolved" error

      - name: Install dependencies
        run: npm install  # We use 'install' instead of 'ci' for better compatibility

      - name: Build
        run: npm run build
        env:
          GCP_API_KEY: ${{ secrets.GCP_API_KEY }}

      - name: Setup Pages
        uses: actions/configure-pages@v4
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # This path must point to the 'dist' folder inside your subfolder
          path: './kmb-route-master-web/dist'
      
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4